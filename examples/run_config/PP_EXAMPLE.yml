# EXAMPLE run: Apollon (surrogate FGSM) on the full CICIDS2017 Friday pcap (nfstream ingestion), scored with PR-AUC, the Robustness Index and more.

general:
    name: "EXAMPLE run (.pcap; RI; PR-AUC; Apollon)"
    description: "Apollon MAB IDS on CICIDS2017 Friday (raw pcap via nfstream), attacked via surrogate; evaluated with PR-AUC, the Robustness Index and further detection metrics under an FGSM sweep"
    seed: 42
    report_path: "out/reports/"
    processed_data_path: "out/processed_datasets/"
    model_store_path: "out/saved_models/"

data_manager:
    dataset:
        -   name: "Friday_full"
            constructor:
                base_path: "raw_data/cic_ids_2017_flow/"
                subfiles:
                    -   name: "Friday-WorkingHours"
                        subpath: "Friday-WorkingHours.pcap"
                        label_column: "Label"          # labels are written by the time-window labeler below
                        benign_labels: [ "BENIGN" ]
                        label_mapping:
                            "BENIGN": "benign"
                            "Bot": "Botnet"
                            "PortScan": "PortScan"
                            "DDoS": "DoS"

            windows:
                - label: Bot
                  start: "2017-07-07 13:00:00"
                  end: "2017-07-07 20:05:00"
                  src_ips: []
                  dst_ips: ["205.174.165.73"]
                - label: PortScan
                  start: "2017-07-07 16:55:00"
                  end: "2017-07-07 18:25:00"
                  src_ips: ["172.16.0.1"]
                  dst_ips: ["192.168.10.50"]
                - label: DDoS               #(15:56 ADT = 18:55 UTC)
                  start: "2017-07-07 18:55:00"
                  end: "2017-07-07 19:16:00"
                  src_ips: ["172.16.0.1"]
                  dst_ips: ["192.168.10.50"]
                - label: BENIGN
                  default: true

            nfstream:
                idle_timeout: 120
                active_timeout: 1800
                statistical_analysis: True
                splt_analysis: 0
                n_dissections: 0
                accounting_mode: 0
                n_meters: 0
                performance_report: 0
                decode_tunnels: False
                bpf_filter: "ip"
                snapshot_length: 1536
                system_visibility_mode: 0

            preprocess:
                -   method: "remove_rows"
                    columns: [ "Label", "flow_start", "src_ip", "dst_ip",
                               "src_mac", "dst_mac", "src_oui", "dst_oui",
                               "id", "expiration_id",
                               "bidirectional_first_seen_ms", "bidirectional_last_seen_ms",
                               "src2dst_first_seen_ms", "src2dst_last_seen_ms",
                               "dst2src_first_seen_ms", "dst2src_last_seen_ms",
                               "vlan_id", "ip_version" ]
                -   method: "remove_nan_rows"
                -   method: "label"
                    columns: [ ]
                    auto_columns: true
                -   method: "min_max"
                    columns: [ ]
                    auto_columns: true

            feature_selector:
                method: none

    split:
        method: "intra"
        test_size: 0.3
        target_column: "target_label"

evaluation:
    general:
        is_multiclass: false

    anomaly_models:
        # Apollon (not differentiable) -> attacked via surrogate transfer
        -   plugin: "apollon_ids"
            save_model: true
            params:
                n_arms: 4                # RF/DT/MLP/LogReg (GaussianNB dropped! - it was the reason for approx. 0.5million misclassifications on whole CICIDS2017)
                n_clusters: 2

    static_metrics:
        -   plugin: "pr_auc_metric"                     # ranks attack vs benign, imbalance-robust
        -   plugin: "robustness_index_metric"           # area under the accuracy-vs-epsilon curve
        -   plugin: "f1_score_metric"
        -   plugin: "matthews_correlation_coefficient"
        -   plugin: "confusion_matrix_metric"
        -   plugin: "precision_score_metric"
        -   plugin: "recall_score_metric"
        -   plugin: "accuracy_metric"
        -   plugin: "roc_auc_metric"
        -   plugin: "roc_curve_metric"
        -   plugin: "intrusion_detection_capability"
        -   plugin: "fppv_metric"
        -   plugin: "time_per_sample_metric"


    runtime_metrics:
        -   plugin: "time_metric"
        -   plugin: "cpu_load_metric"
        -   plugin: "ram_usage_metric"

    adversarial_attacks:
        enabled: true
        #this surrogate is not deterministic and therefore leads to different outcomes in the RI-metric
        #sometimes its done after 6 epochs, sometimes its done after 11 epochs
        #This makes reproducing the values from the poster hard and should better be done with a stochastic method rather than relying one one run.
        use_surrogate: true
        surrogate_epochs: 25
        attacks:
            -   plugin: "fgsm_attack"
                params:
                    eps: 0.1
                    clip_min: 0.0
                    clip_max: 1.0

    robustness:
        enabled: true
        eps_values:
            - 0.001
            - 0.01
            - 0.02
            - 0.05
            - 0.1
            - 0.2
            - 0.3
