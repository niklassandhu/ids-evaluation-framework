general:
    name: "DEMO TB and DT on CICIDS2017 - Intra Dataset Split"
    description: "Evaluation Live Demo"
    seed: 42
    report_path: "out/reports/"
    processed_data_path: "out/processed_datasets/"
    model_store_path: "out/saved_models/"
    plugin_runtime_metric_path: "../../plugin_runtime_metric/"
    plugin_adversarial_path: "../../plugin_adversarial/"
    plugin_static_metric_path: "../../plugin_static_metric/"
data_manager:
    dataset:
        -   name: "T-Pot Dataset"
            constructor:
                base_path: "raw_data/test_dataset/"
                subfiles:
                    -   name: "Binary-Information"
                        subpath: "binary_information.csv"
                        label_column: "label"
                        benign_labels: [ "BENIGN" ]
                    -   name: "Commands"
                        subpath: "commands.csv"
                        label_column: "label"
                        benign_labels: [ "BENIGN" ]
                    -   name: "Logins"
                        subpath: "logins.csv"
                        label_column: "label"
                        benign_labels: [ "BENIGN" ]
                    -   name: "Network-Binary-Connection"
                        subpath: "network_binary_connection.csv"
                        label_column: "label"
                        benign_labels: [ "BENIGN" ]
                    -   name: "Network-Traffic"
                        subpath: "network_traffic.csv"
                        label_column: "label"
                        benign_labels: [ "BENIGN" ]
            preprocess:
                -   method: "remove_rows"
                    columns: [ "label" ]
                -   method: "label"
                    columns: [ ]
                    auto_columns: true
                -   method: "one_hot"
                    auto_columns: true
                    columns: [ ] 
            feature_selector:
                method: none
    split:
        method: "intra"
        test_size: 0.3
        target_column: "target_label"  # attack_category is multiclass
evaluation:
    general:
        is_multiclass: false

    anomaly_models:
        -   plugin: "ml_decision_tree"
            save_model: true
            params:
                random_state: 42
    static_metrics:
        -   plugin: "accuracy_metric"
        -   plugin: "f1_score_metric"
        -   plugin: "precision_score_metric"
        -   plugin: "recall_score_metric"
        -   plugin: "confusion_matrix_metric"
        -   plugin: "roc_auc_metric"
        -   plugin: "roc_curve_metric"
        -   plugin: "matthews_correlation_coefficient"
        -   plugin: "intrusion_detection_capability"
        -   plugin: "mttd_metric"
        -   plugin: "fppv_metric"
        -   plugin: "retrain_cost_metric"
        -   plugin: "time_per_sample_metric"
    runtime_metrics:
        -   plugin: "time_metric"
        -   plugin: "cpu_load_metric"
            params:
                interval: 0.01
        -   plugin: "ram_usage_metric"
        -   plugin: "emission_metric"
