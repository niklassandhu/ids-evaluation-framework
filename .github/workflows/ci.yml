name: CI
on: [ push, pull_request ]

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v4
            -   name: Install uv
                uses: astral-sh/setup-uv@v6
            -   name: Set up Python (read from .python-version)
                run: uv python install
            -   name: Install project (locked, include dev)
                run: uv sync --locked --dev
            -   name: Run linters & tests
                run: |
                    uv run ruff check .
                    uv run pytest
    pypi-publish:
        name: Upload release to PyPI
        runs-on: ubuntu-latest
        environment:
            name: pypi
            url: https://pypi.org/p/IdsEvaluationFramework
        permissions:
            id-token: write
        steps:
            - uses: actions/checkout@v4
            - name: Install uv
              uses: astral-sh/setup-uv@v6
            - name: Set up Python (read from .python-version)
              run: uv python install
            - name: Install build
              run: uv pip install build
            - name: Build package
              run: uvx --from build python -m build
            - name: List dist
              run: ls -la dist || true
            - name: Publish package distributions to PyPI
              uses: pypa/gh-action-pypi-publish@release/v1
