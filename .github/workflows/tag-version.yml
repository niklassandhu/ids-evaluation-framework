name: Tag version from pyproject.toml

on:
  push:
    branches: [ "**" ]
    paths:
      - 'pyproject.toml'

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version and create tag
        id: tagger
        run: |
          VERSION="$(python -c "import tomllib; d=tomllib.load(open('pyproject.toml','rb')); print(d['project']['version'])")"
          TAG="v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          # Configure identity for the tag commit metadata (not a commit; just tag object metadata)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # If tag doesn't exist yet, create and push it
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists; nothing to do."
            exit 0
          fi

          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"